<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Sun</title>
<style>
  :root {
    --bg: #0d0a08;
    --card: #14110e;
    --border: #2a2520;
    --text: #c4bdb5;
    --text-dim: #6b645c;
    --accent: #c47a5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 60px 40px;
    min-height: 100vh;
  }
  .container {
    max-width: 520px;
    margin: 0 auto;
  }
  .header {
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .header p {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .projects {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .project {
    display: block;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 2px;
    transition: all 0.2s ease;
    position: relative;
  }
  .project:hover {
    background: var(--card);
    border-color: var(--border);
  }
  .project:hover .arrow {
    opacity: 1;
    transform: translateX(0);
  }
  .project-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
    margin-bottom: 2px;
  }
  .project-desc {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .arrow {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    opacity: 0;
    transition: all 0.2s ease;
    color: var(--accent);
    font-size: 12px;
  }
  .footer {
    margin-top: 64px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Tim Sun</h1>
    <p>Projects &amp; things</p>
  </div>

  <div class="projects">
    <a href="/xixia-map/" class="project">
      <div class="project-name">西夏遗珍 · Western Xia Heritage</div>
      <div class="project-desc">Interactive map of Tangut Empire sites &amp; artifacts</div>
      <span class="arrow">→</span>
    </a>
    <!-- future projects here -->
  </div>

  <div class="footer">
    <a href="https://github.com/timsun001" style="color: inherit;">github.com/timsun001</a>
  </div>
</div>
</body>
</html>
