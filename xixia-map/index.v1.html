<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西夏遗珍 · Western Xia Heritage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ===== WESTERN XIA DESIGN SYSTEM ===== */
:root {
  --terracotta: #8B2500;
  --terracotta-light: #A0522D;
  --gold: #DAA520;
  --gold-dark: #B8860B;
  --charcoal: #1a1a2e;
  --charcoal-light: #2a2a3e;
  --parchment: #FFF8DC;
  --parchment-dark: #F5E6C8;
  --cream: #FAEBD7;
  --text: #2c1810;
  --text-light: #5c4830;
  --abroad: #DAA520;
  --site: #8B2500;
  --border-geo: #C4A35A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'Xixia';
  src: local('STSong'), local('SimSun'), local('Songti SC'), local('serif');
}

body {
  font-family: 'Xixia', 'Songti SC', 'STSong', 'Noto Serif SC', Georgia, serif;
  background: var(--charcoal);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ===== PARCHMENT BORDER TEXTURE ===== */
#app {
  display: flex;
  height: 100vh;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(139,37,0,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(218,165,32,0.05) 0%, transparent 50%),
    var(--charcoal);
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 380px;
  min-width: 380px;
  background:
    linear-gradient(180deg, var(--parchment-dark) 0%, var(--parchment) 30%, var(--cream) 100%);
  display: flex;
  flex-direction: column;
  border-right: 3px solid var(--border-geo);
  box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  position: relative;
  z-index: 10;
}

/* Decorative border pattern */
#sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: -3px; bottom: 0;
  width: 8px;
  background: repeating-linear-gradient(
    0deg,
    var(--gold) 0px, var(--gold) 2px,
    transparent 2px, transparent 6px,
    var(--terracotta) 6px, var(--terracotta) 8px,
    transparent 8px, transparent 12px
  );
}

/* ===== HEADER ===== */
#header {
  padding: 24px 20px 16px;
  text-align: center;
  border-bottom: 2px solid var(--border-geo);
  position: relative;
}

#header::before {
  content: '𗼇𗙏';
  display: block;
  font-size: 13px;
  color: var(--terracotta-light);
  letter-spacing: 12px;
  margin-bottom: 4px;
  opacity: 0.6;
}

#header h1 {
  font-size: 28px;
  font-weight: 900;
  color: var(--charcoal);
  letter-spacing: 4px;
  margin-bottom: 4px;
}

#header .subtitle {
  font-size: 12px;
  color: var(--text-light);
  letter-spacing: 3px;
  text-transform: uppercase;
}

#header .tangut-seal {
  display: block;
  width: 48px;
  height: 48px;
  margin: 0 auto 8px;
  border: 2px solid var(--terracotta);
  transform: rotate(45deg);
  position: relative;
}

#header .tangut-seal::after {
  content: '夏';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) rotate(-45deg);
  font-size: 22px;
  color: var(--terracotta);
  font-weight: bold;
}

/* ===== FILTER TABS ===== */
#filters {
  display: flex;
  padding: 12px 16px;
  gap: 6px;
  border-bottom: 1px solid var(--border-geo);
  background: rgba(218,165,32,0.05);
}

.filter-btn {
  flex: 1;
  padding: 8px 4px;
  border: 1px solid var(--border-geo);
  background: var(--parchment);
  color: var(--text-light);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 1px;
  transition: all 0.25s;
  position: relative;
}

.filter-btn:hover {
  background: var(--gold);
  color: var(--charcoal);
  border-color: var(--gold-dark);
}

.filter-btn.active {
  background: var(--terracotta);
  color: var(--cream);
  border-color: var(--terracotta);
  font-weight: bold;
}

.filter-btn .count {
  display: block;
  font-size: 10px;
  opacity: 0.7;
  margin-top: 2px;
}

/* ===== SITE LIST ===== */
#site-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#site-list::-webkit-scrollbar {
  width: 6px;
}
#site-list::-webkit-scrollbar-track {
  background: var(--parchment);
}
#site-list::-webkit-scrollbar-thumb {
  background: var(--border-geo);
  border-radius: 3px;
}

.site-item {
  padding: 14px 20px;
  cursor: pointer;
  border-left: 4px solid transparent;
  transition: all 0.2s;
  border-bottom: 1px dotted rgba(196,163,90,0.2);
  position: relative;
}

.site-item:hover {
  background: rgba(218,165,32,0.1);
  border-left-color: var(--gold);
}

.site-item.selected {
  background: rgba(139,37,0,0.08);
  border-left-color: var(--terracotta);
}

.site-item .site-name {
  font-size: 15px;
  font-weight: bold;
  color: var(--charcoal);
  margin-bottom: 3px;
}

.site-item .site-type {
  font-size: 11px;
  color: var(--text-light);
  letter-spacing: 0.5px;
}

.site-item .site-badge {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
  letter-spacing: 0.5px;
}

.badge-site {
  background: rgba(139,37,0,0.12);
  color: var(--terracotta);
}

.badge-artifact {
  background: rgba(218,165,32,0.15);
  color: var(--gold-dark);
}

.badge-abroad {
  background: rgba(218,165,32,0.2);
  color: var(--gold-dark);
  border: 1px solid var(--gold);
}

/* ===== MAP CONTAINER ===== */
#map-container {
  flex: 1;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
}

/* ===== CUSTOM LEAFLET POPUPS ===== */
.xixia-popup .leaflet-popup-content-wrapper {
  background: linear-gradient(135deg, var(--parchment) 0%, var(--cream) 100%);
  border: 2px solid var(--border-geo);
  border-radius: 0;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  padding: 0;
  font-family: 'Xixia', 'Songti SC', 'STSong', serif;
  max-width: 340px;
}

.xixia-popup .leaflet-popup-content {
  margin: 0;
  padding: 0;
}

.xixia-popup .leaflet-popup-tip {
  background: var(--border-geo);
}

.popup-inner {
  padding: 16px;
}

.popup-header {
  border-bottom: 1px solid var(--border-geo);
  padding-bottom: 10px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.popup-icon {
  width: 36px;
  height: 36px;
  min-width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transform: rotate(45deg);
  border: 2px solid;
}

.popup-icon.site-icon {
  border-color: var(--terracotta);
  color: var(--terracotta);
}
.popup-icon.artifact-icon {
  border-color: var(--gold-dark);
  color: var(--gold-dark);
}

.popup-icon span {
  transform: rotate(-45deg);
}

.popup-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--charcoal);
  line-height: 1.3;
}

.popup-title .en {
  display: block;
  font-size: 10px;
  font-weight: normal;
  color: var(--text-light);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.popup-meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 12px;
}

.popup-row {
  display: flex;
  gap: 8px;
  line-height: 1.5;
}

.popup-label {
  color: var(--terracotta-light);
  font-weight: bold;
  min-width: 56px;
  font-size: 11px;
}

.popup-value {
  color: var(--text);
  flex: 1;
}

.popup-abroad {
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(218,165,32,0.12);
  border-left: 3px solid var(--gold);
  font-size: 11px;
  color: var(--gold-dark);
}

.popup-note {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dotted var(--border-geo);
  font-size: 11px;
  color: var(--text-light);
  font-style: italic;
  line-height: 1.5;
}

/* ===== LEGEND ===== */
#legend {
  position: absolute;
  bottom: 30px;
  right: 20px;
  background: rgba(26,26,46,0.92);
  border: 1px solid var(--border-geo);
  padding: 14px 16px;
  z-index: 1000;
  color: var(--cream);
  font-size: 11px;
  letter-spacing: 0.5px;
}

#legend h4 {
  font-size: 12px;
  margin-bottom: 8px;
  color: var(--gold);
  letter-spacing: 2px;
  text-align: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}

.legend-dot {
  width: 12px;
  height: 12px;
  min-width: 12px;
}

.legend-dot.site-dot {
  background: var(--terracotta);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}

.legend-dot.artifact-dot {
  background: var(--gold);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}

.legend-dot.abroad-dot {
  background: var(--gold-dark);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
}

/* ===== TITLE OVERLAY ON MAP ===== */
#map-title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  pointer-events: none;
}

#map-title .map-label {
  background: rgba(26,26,46,0.85);
  color: var(--gold);
  padding: 8px 20px;
  font-size: 13px;
  letter-spacing: 3px;
  border: 1px solid var(--border-geo);
  text-align: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #app {
    flex-direction: column;
  }
  #sidebar {
    width: 100%;
    min-width: 100%;
    max-height: 40vh;
    flex-shrink: 0;
  }
  #map-container {
    flex: 1;
    min-height: 0;
  }
  #legend {
    bottom: 10px;
    right: 10px;
    font-size: 10px;
    padding: 10px 12px;
  }
  #header h1 {
    font-size: 22px;
  }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.site-item {
  animation: fadeInUp 0.3s ease-out forwards;
}
</style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="header">
      <div class="tangut-seal"></div>
      <h1>西夏遗珍</h1>

    </div>

  <!-- MAP -->
  <div id="map-container">

      <div class="legend-item"><span class="legend-dot abroad-dot"></span> 海外藏品</div>
    </div>
  </div>

</div>

// ===== INIT MAP =====
const map = L.map('map', {
  center: [39.0, 103.5],
  zoom: 6,
  zoomControl: true,
  maxBounds: [[30, 85], [48, 120]],
  maxBoundsViscosity: 0.5
});

// Custom tile layer - use a warm-toned style
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> | Western Xia Heritage Map',
  maxZoom: 13
}).addTo(map);

// ===== CUSTOM MARKER ICONS =====
function createMarkerIcon(type, abroad) {
  const size = type === 'site' ? 28 : 24;
  const color = abroad ? '#DAA520' : (type === 'site' ? '#8B2500' : '#B8860B');

  let svg;
  if (type === 'site') {
    // Hexagon for sites
    svg = `<svg width="${size}" height="${size}" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="${color}" stroke="#1a1a2e" stroke-width="1.5"/>
      <text x="14" y="17" text-anchor="middle" fill="#FFF8DC" font-size="11" font-family="serif">⬡</text>
    </svg>`;
  } else if (abroad) {
    // Pentagon for abroad artifacts
    svg = `<svg width="${size}" height="${size}" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,2 26,10 22,24 6,24 2,10" fill="${color}" stroke="#1a1a2e" stroke-width="1.5"/>
      <text x="14" y="17" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="serif">◆</text>
    </svg>`;
  } else {
    // Diamond for domestic artifacts
    svg = `<svg width="${size}" height="${size}" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,2 26,14 14,26 2,14" fill="${color}" stroke="#1a1a2e" stroke-width="1.5"/>
      <text x="14" y="17" text-anchor="middle" fill="#FFF8DC" font-size="11" font-family="serif">◇</text>
    </svg>`;
  }

  return L.divIcon({
    className: 'custom-marker',
    html: svg,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

// ===== BUILD POPUP HTML =====
function buildPopup(site) {
  const iconClass = site.type === 'site' ? 'site-icon' : 'artifact-icon';
  const iconChar = site.type === 'site' ? '⬡' : '◇';

  let html = `
    <div class="popup-inner">
      <div class="popup-header">
        <div class="popup-icon ${iconClass}"><span>${iconChar}</span></div>
        <div class="popup-title">
          ${site.name}
          <span class="en">${site.nameEn}</span>
        </div>
      </div>
      <div class="popup-meta">
        <div class="popup-row">
          <span class="popup-label">类型</span>
          <span class="popup-value">${site.category}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">原址</span>
          <span class="popup-value">${site.location}</span>
        </div>
        <div class="popup-row">
          <span class="popup-label">现藏</span>
          <span class="popup-value">${site.museum}</span>
        </div>
      </div>`;

  if (site.abroad) {
    html += `<div class="popup-abroad">🌍 该文物目前收藏于海外</div>`;
  }

  html += `
      <div class="popup-note">${site.note}</div>
    </div>`;

  return html;
}

// ===== RENDER SITE LIST =====
const siteListEl = document.getElementById('site-list');
let activeFilter = 'all';
let markers = {};
let selectedId = null;

function renderList(filter) {
  siteListEl.innerHTML = '';
  const filtered = filter === 'all'
    ? sites
    : filter === 'abroad'
      ? sites.filter(s => s.abroad)
      : sites.filter(s => s.type === filter);

  filtered.forEach((site, i) => {
    const el = document.createElement('div');
    el.className = 'site-item' + (site.id === selectedId ? ' selected' : '');
    el.style.animationDelay = `${i * 0.03}s`;

    let badgeClass = site.abroad ? 'badge-abroad' : (site.type === 'site' ? 'badge-site' : 'badge-artifact');
    let badgeText = site.abroad ? '海外' : (site.type === 'site' ? '遗址' : '文物');

    el.innerHTML = `
      <div class="site-name">${site.name}</div>
      <div class="site-type">${site.category} · ${site.nameEn}</div>
      <span class="site-badge ${badgeClass}">${badgeText}</span>
    `;

    el.addEventListener('click', () => {
      selectSite(site.id);
    });

    siteListEl.appendChild(el);
  });
}

function selectSite(id) {
  selectedId = id;
  renderList(activeFilter);

  const site = sites.find(s => s.id === id);
  if (!site) return;

  const marker = markers[id];
  if (marker) {
    map.flyTo([site.lat, site.lng], site.type === 'site' ? 10 : 8, {
      duration: 1.2
    });
    setTimeout(() => marker.openPopup(), 800);
  }
}

// ===== ADD MARKERS TO MAP =====
sites.forEach(site => {
  const icon = createMarkerIcon(site.type, site.abroad);
  const marker = L.marker([site.lat, site.lng], { icon })
    .bindPopup(buildPopup(site), {
      className: 'xixia-popup',
      maxWidth: 340,
      closeButton: true
    })
    .addTo(map);

  marker.on('popupopen', () => {
    selectSite(site.id);
  });

  markers[site.id] = marker;
});

// ===== FILTER BUTTONS =====
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;

    // Show/hide markers
    sites.forEach(site => {
      const marker = markers[site.id];
      if (!marker) return;
      const visible = activeFilter === 'all'
        || (activeFilter === 'abroad' && site.abroad)
        || site.type === activeFilter;
      if (visible) {
        marker.addTo(map);
      } else {
        marker.remove();
      }
    });

    selectedId = null;
    renderList(activeFilter);
  });
});

// ===== INITIAL RENDER =====
renderList('all');

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    selectedId = null;
    renderList(activeFilter);
    map.closePopup();
    map.flyTo([39.0, 103.5], 6);
  }
});

console.log('🏯 西夏遗珍 · Western Xia Heritage Map · 27 sites loaded');
</script>
